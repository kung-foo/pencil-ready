<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencil Ready</title>
    <!-- Kick off the critical font fetches before CSS parses, so the
         swap from fallback to Roboto Slab happens as early as possible.
         Regular 400 = body text. SemiBold 600 = header + section titles. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/RobotoSlab-Regular.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/RobotoSlab-SemiBold.woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
